services:
  app:
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      APP_PORT: ${APP_PORT}
      APP_USER_SESSION_TTL: ${APP_USER_SESSION_TTL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      MONGODB_EVENTHUB_DATABASE: ${MONGODB_EVENTHUB_DATABASE}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_USER: ${MONGODB_USER}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_HOST: ${MONGODB_HOST}
      MONGODB_PORT: ${MONGODB_PORT}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: ${MONGODB_HOST}
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    command: ["mongod", "--port", "${MONGODB_PORT}"]
    healthcheck:
      test: ["CMD", "mongosh", "--port", "${MONGODB_PORT}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: ${REDIS_HOST}
    command: redis-server --port ${REDIS_PORT}
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
