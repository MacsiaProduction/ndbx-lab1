server:
  port: ${APP_PORT:8080}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

app:
  session:
    ttl: ${APP_USER_SESSION_TTL:3600}
  mongodb:
    database: ${MONGODB_EVENTHUB_DATABASE:${MONGODB_DATABASE:eventhub}}
    user: ${MONGODB_USER:}
    password: ${MONGODB_PASSWORD:}
    host: ${MONGODB_HOST:localhost}
    port: ${MONGODB_PORT:27017}
